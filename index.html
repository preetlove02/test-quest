<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Thryve Quest</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#11141a;
    --bg-soft:#161b23;
    --card:#1d2330;
    --card-hover:#232a3a;
    --border:#2b3247;
    --text:#f3eee3;
    --text-dim:#9aa3b8;
    --text-faint:#5c6478;
    --accent:#d2a24c;
    --accent-soft:rgba(210,162,76,0.14);
    --accent-strong:#e8bd6e;
    --danger:#e2685a;
    --danger-soft:rgba(226,104,90,0.12);
    --success:#7fb39a;
    --success-soft:rgba(127,179,154,0.12);
    --radius:14px;
    --serif:'Fraunces', serif;
    --sans:'Inter', system-ui, sans-serif;
    --mono:'JetBrains Mono', monospace;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:var(--bg);
    color:var(--text);
    font-family:var(--sans);
    -webkit-font-smoothing:antialiased;
    min-height:100vh;
    background-image:
      radial-gradient(circle at 12% -10%, rgba(210,162,76,0.10), transparent 45%),
      radial-gradient(circle at 100% 10%, rgba(127,179,154,0.06), transparent 40%);
    background-attachment:fixed;
  }
  #app{max-width:720px;margin:0 auto;padding:0 20px 80px;min-height:100vh;display:flex;flex-direction:column;}

  /* ---------- Header / brand ---------- */
  .brandbar{display:flex;align-items:center;gap:14px;padding:28px 0 20px;}
  .brandbar img{width:40px;height:40px;border-radius:50%;flex-shrink:0;}
  .brandbar .word{display:flex;flex-direction:column;line-height:1.1;}
  .brandbar .word b{font-family:var(--serif);font-weight:700;font-size:19px;letter-spacing:.01em;}
  .brandbar .word span{font-family:var(--mono);font-size:10.5px;letter-spacing:.14em;text-transform:uppercase;color:var(--text-faint);margin-top:2px;}

  /* ---------- Generic screen / card ---------- */
  .screen{flex:1;display:flex;flex-direction:column;justify-content:center;animation:fadeUp .45s ease both;}
  @keyframes fadeUp{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:translateY(0);}}
  .centerpane{display:flex;flex-direction:column;align-items:center;text-align:center;gap:18px;padding:40px 0;}
  .ring{width:88px;height:88px;border-radius:50%;display:flex;align-items:center;justify-content:center;border:1.5px solid var(--border);background:var(--card);position:relative;}
  .ring::before{content:'';position:absolute;inset:-8px;border-radius:50%;border:1px solid var(--accent-soft);}
  .spinner{width:26px;height:26px;border-radius:50%;border:2.5px solid var(--border);border-top-color:var(--accent);animation:spin 0.9s linear infinite;}
  @keyframes spin{to{transform:rotate(360deg);}}
  h1.title{font-family:var(--serif);font-weight:600;font-size:26px;margin:0;}
  p.lede{color:var(--text-dim);font-size:15px;line-height:1.6;max-width:440px;margin:0;}
  .eyebrow{font-family:var(--mono);font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:var(--accent);}

  /* ---------- buttons / inputs ---------- */
  .btn{
    appearance:none;border:none;cursor:pointer;
    font-family:var(--sans);font-weight:600;font-size:15px;
    padding:14px 26px;border-radius:999px;
    transition:transform .15s ease, box-shadow .15s ease, opacity .15s ease;
  }
  .btn-primary{background:linear-gradient(135deg,var(--accent-strong),var(--accent));color:#1a1305;box-shadow:0 8px 20px -8px rgba(210,162,76,0.55);}
  .btn-primary:hover{transform:translateY(-1px);}
  .btn-primary:disabled{opacity:.45;cursor:not-allowed;transform:none;box-shadow:none;}
  .btn-ghost{background:transparent;color:var(--text-dim);border:1px solid var(--border);}
  .btn-ghost:hover{color:var(--text);border-color:var(--text-faint);}
  .btn-row{display:flex;gap:12px;justify-content:space-between;margin-top:28px;}

  label.field{display:flex;flex-direction:column;gap:7px;margin-bottom:18px;text-align:left;}
  label.field span.lbl{font-size:13px;color:var(--text-dim);font-weight:500;}
  label.field span.lbl em{color:var(--accent);font-style:normal;}
  input[type=text],input[type=email],input[type=tel],select{
    background:var(--card);border:1px solid var(--border);color:var(--text);
    border-radius:10px;padding:13px 14px;font-size:15px;font-family:var(--sans);
    outline:none;transition:border-color .15s ease, background .15s ease;
  }
  input::placeholder{color:var(--text-faint);}
  input:focus,select:focus{border-color:var(--accent);background:var(--card-hover);}
  input.error,select.error{border-color:var(--danger);}
  select{appearance:none;background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='10' height='6'><path d='M0 0L5 6L10 0' fill='none' stroke='%239aa3b8' stroke-width='1.4'/></svg>");background-repeat:no-repeat;background-position:right 14px center;}

  .formcard{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:28px 26px;margin-top:8px;}

  /* ---------- Progress trail ---------- */
  .trail-wrap{padding:18px 0 6px;}
  .trail{display:flex;align-items:center;gap:3px;}
  .trail .node{flex:1;height:4px;border-radius:3px;background:var(--border);position:relative;overflow:hidden;}
  .trail .node.done{background:var(--accent);}
  .trail .node.current{background:linear-gradient(90deg,var(--accent),var(--border));}
  .progress-meta{display:flex;justify-content:space-between;align-items:baseline;margin-top:10px;}
  .progress-meta .stage{font-family:var(--mono);font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--text-faint);}
  .progress-meta .pct{font-family:var(--mono);font-size:11px;color:var(--accent);}

  /* ---------- Section header ---------- */
  .section-head{padding:22px 0 6px;position:relative;}
  .section-head .sec-no{font-family:var(--mono);font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:var(--accent);}
  .section-head h2{font-family:var(--serif);font-weight:600;font-size:24px;margin:6px 0 8px;}
  .section-head .sub{color:var(--text-dim);font-size:13.5px;}
  .section-head .instructions{margin-top:10px;font-size:13.5px;color:var(--text-dim);background:var(--accent-soft);border-left:2px solid var(--accent);padding:10px 14px;border-radius:0 8px 8px 0;}
  .sunburst{position:absolute;right:-10px;top:6px;width:64px;height:64px;opacity:.18;pointer-events:none;}

  /* ---------- Question blocks ---------- */
  .qblock{margin-top:18px;padding:20px 18px;background:var(--card);border:1px solid var(--border);border-radius:var(--radius);transition:border-color .2s ease;}
  .qblock.unanswered-flag{border-color:var(--danger);}
  .qblock .qhead{display:flex;gap:10px;align-items:flex-start;margin-bottom:14px;}
  .qblock .qnum{font-family:var(--mono);font-size:12px;color:var(--accent);flex-shrink:0;padding-top:2px;min-width:26px;}
  .qblock .qtext{font-size:15.5px;line-height:1.5;}
  .qblock .qhint{font-size:11.5px;color:var(--text-faint);margin-top:3px;}

  .opt{display:flex;align-items:flex-start;gap:11px;padding:11px 13px;border-radius:10px;border:1px solid var(--border);margin-bottom:8px;cursor:pointer;transition:background .15s ease,border-color .15s ease;background:var(--bg-soft);}
  .opt:hover{border-color:var(--text-faint);}
  .opt.selected{border-color:var(--accent);background:var(--accent-soft);}
  .opt .mark{flex-shrink:0;width:20px;height:20px;border-radius:50%;border:1.5px solid var(--text-faint);display:flex;align-items:center;justify-content:center;margin-top:1px;}
  .opt.checkbox .mark{border-radius:6px;}
  .opt.selected .mark{border-color:var(--accent);background:var(--accent);}
  .opt .mark .dot{width:8px;height:8px;border-radius:50%;background:#1a1305;opacity:0;}
  .opt.checkbox .mark .dot{width:10px;height:10px;border-radius:2px;}
  .opt.selected .mark .dot{opacity:1;}
  .opt .otext{font-size:14.5px;line-height:1.45;}
  .opt .oletter{font-family:var(--mono);color:var(--text-faint);font-size:12px;margin-right:6px;}

  .wat-row{display:flex;align-items:center;gap:14px;padding:10px 0;border-bottom:1px dashed var(--border);}
  .wat-row:last-child{border-bottom:none;}
  .wat-row .wat-word{font-family:var(--serif);font-size:17px;min-width:120px;flex-shrink:0;}
  .wat-row input{flex:1;}
  .wat-group-label{font-family:var(--mono);font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:var(--text-faint);margin:18px 0 4px;}
  .wat-group-label:first-child{margin-top:4px;}

  /* ---------- Toast ---------- */
  #toast{position:fixed;bottom:26px;left:50%;transform:translateX(-50%) translateY(20px);background:#21283a;border:1px solid var(--border);color:var(--text);padding:12px 20px;border-radius:999px;font-size:13.5px;box-shadow:0 12px 30px -10px rgba(0,0,0,0.6);opacity:0;pointer-events:none;transition:opacity .25s ease, transform .25s ease;z-index:50;}
  #toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

  /* ---------- misc states ---------- */
  .badge{display:inline-flex;align-items:center;gap:6px;font-family:var(--mono);font-size:11px;letter-spacing:.08em;text-transform:uppercase;padding:6px 12px;border-radius:999px;}
  .badge.denied{background:var(--danger-soft);color:var(--danger);}
  .badge.ok{background:var(--success-soft);color:var(--success);}
  footer.foot{padding:30px 0 10px;text-align:center;color:var(--text-faint);font-size:12px;}

  @media (max-width:480px){
    .wat-row{flex-direction:column;align-items:flex-start;gap:6px;}
    .wat-row .wat-word{min-width:0;}
    .wat-row input{width:100%;}
    h1.title{font-size:22px;}
    .section-head h2{font-size:20px;}
  }
</style>
</head>

/* =========================================================================
   UTIL
   ========================================================================= */
function qs(name){
  const m = new URLSearchParams(window.location.search);
  return m.get(name) || "";
}
function toast(msg, ms=2600){
  const t = document.getElementById("toast");
  t.textContent = msg;
  t.classList.add("show");
  clearTimeout(t._tm);
  t._tm = setTimeout(()=>t.classList.remove("show"), ms);
}
function esc(s){
  return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}
function brandbar(){
  return `<div class="brandbar"><img src="${LOGO_SRC}" alt="Thryve"><div class="word"><b>Thryve Quest</b><span>Discover what drives you</span></div></div>`;
}
function sunburstSVG(){
  return `<svg class="sunburst" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
    ${Array.from({length:16}).map((_,i)=>{
      const a = (i*22.5)*Math.PI/180;
      const x1=50+18*Math.cos(a), y1=50+18*Math.sin(a);
      const x2=50+46*Math.cos(a), y2=50+46*Math.sin(a);
      return `<line x1="${x1}" y1="${y1}" x2="${x2}" y2="${y2}" stroke="var(--accent)" stroke-width="3" stroke-linecap="round"/>`;
    }).join("")}
  </svg>`;
}

/* =========================================================================
   JSONP helper (for add / check / use — small fast actions)
   ========================================================================= */
let jsonpCounter = 0;
function jsonp(params){
  return new Promise((resolve, reject) => {
    jsonpCounter += 1;
    const cbName = "thryveCb_" + Date.now() + "_" + jsonpCounter;
    const script = document.createElement("script");
    let finished = false;

    function cleanup(){
      delete window[cbName];
      if (script.parentNode) script.parentNode.removeChild(script);
      clearTimeout(timer);
    }
    const timer = setTimeout(() => {
      if (finished) return;
      finished = true;
      cleanup();
      reject(new Error("Request timed out. Please check your connection and try again."));
    }, CONFIG.JSONP_TIMEOUT_MS);

    window[cbName] = function(data){
      if (finished) return;
      finished = true;
      cleanup();
      resolve(data);
    };

    const qsParams = new URLSearchParams({ ...params, callback: cbName });
    script.src = CONFIG.SCRIPT_URL + "?" + qsParams.toString();
    script.onerror = function(){
      if (finished) return;
      finished = true;
      cleanup();
      reject(new Error("Could not reach the server."));
    };
    document.body.appendChild(script);
  });
}

async function sheetCheck(otp){ return jsonp({ action:"check", otp }); }
async function sheetUse(otp, name, email){ return jsonp({ action:"use", otp, name, email }); }

async function sheetSubmit(payload){
  const res = await fetch(CONFIG.SCRIPT_URL, {
    method: "POST",
    headers: { "Content-Type": "text/plain;charset=utf-8" },
    body: JSON.stringify(payload)
  });
  return res.json();
}

async function onBeginClick(){
  const name = document.getElementById("f_name").value.trim();
  const email = document.getElementById("f_email").value.trim();
  const contactNumber = document.getElementById("f_contact").value.trim();
  const studentClass = document.getElementById("f_class").value.trim();
  const school = document.getElementById("f_school").value.trim();
  const parentName = document.getElementById("f_parent").value.trim();
  const ageGroup = document.getElementById("f_age").value.trim();

  const fields = [
    ["f_name", name], ["f_email", email], ["f_contact", contactNumber],
    ["f_class", studentClass], ["f_school", school], ["f_parent", parentName], ["f_age", ageGroup]
  ];
  let ok = true;
  fields.forEach(([id, val]) => {
    const el = document.getElementById(id);
    if (!val){ el.classList.add("error"); ok = false; } else { el.classList.remove("error"); }
  });
  if (!ok){ toast("Please fill in every field to continue."); return; }
  if (!/^\S+@\S+\.\S+$/.test(email)){ document.getElementById("f_email").classList.add("error"); toast("Please enter a valid email address."); return; }

  const btn = document.getElementById("beginBtn");
  btn.disabled = true; btn.textContent = "Starting…";

  try{
    const res = await sheetUse(OTP, name, email);
    if (res.status !== "ok"){
      renderDenied(res.msg || "This access link is no longer valid.");
      return;
    }
    student = { name, email, studentClass, school, parentName, ageGroup, contactNumber };
    currentSectionIdx = 0;
    renderSection();
  }catch(e){
    btn.disabled = false; btn.textContent = "Begin My Quest →";
    toast(e.message || "Something went wrong. Please try again.");
  }
}

/* =========================================================================
   RENDER: a quiz section
   ========================================================================= */
function totalQuestions(){
  return QUEST_DATA.reduce((sum,s)=>sum+s.questions.length,0);
}
function answeredCount(){
  let n=0;
  QUEST_DATA.forEach(sec=>{
    sec.questions.forEach(q=>{
      const key = q.q;
      const v = answers[key];
      if (sec.type==="multi"){ if (v && v.length) n++; }
      else { if (v && String(v).trim()) n++; }
    });
  });
  return n;
}

function renderTrail(){
  const nodes = QUEST_DATA.map((s,i)=>{
    let cls = "node";
    if (i < currentSectionIdx) cls += " done";
    else if (i === currentSectionIdx) cls += " current";
    return `<div class="${cls}"></div>`;
  }).join("");
  const pct = Math.round((answeredCount()/totalQuestions())*100);
  return `
    <div class="trail-wrap">
      <div class="trail">${nodes}</div>
      <div class="progress-meta">
        <span class="stage">Stage ${currentSectionIdx+1} of ${QUEST_DATA.length}</span>
        <span class="pct">${pct}% answered</span>
      </div>
    </div>
  `;
}

function optionRow(letter, text, selected, multi, qIndex, optIndex){
  return `
    <div class="opt ${multi?'checkbox':''} ${selected?'selected':''}" data-qidx="${qIndex}" data-oidx="${optIndex}">
      <div class="mark"><div class="dot"></div></div>
      <div class="otext"><span class="oletter">${letter}</span>${esc(text)}</div>
    </div>
  `;
}

function renderSection(){
  const sec = QUEST_DATA[currentSectionIdx];
  let bodyHtml = "";

  if (sec.type === "text"){
    // Word association — grouped list of single text inputs
    let lastGroup = null;
    bodyHtml += `<div class="qblock" id="wat-block">`;
    sec.questions.forEach((item, qi) => {
      if (item.group !== lastGroup){
        bodyHtml += `<div class="wat-group-label">${esc(item.group)}</div>`;
        lastGroup = item.group;
      }
      const val = answers[item.q] || "";
      bodyHtml += `
        <div class="wat-row">
          <div class="wat-word">${esc(item.q)}</div>
          <input type="text" data-watidx="${qi}" placeholder="first word that comes to mind" value="${esc(val)}">
        </div>
      `;
    });
    bodyHtml += `</div>`;
  } else {
    sec.questions.forEach((q, qi) => {
      const isMulti = sec.type === "multi";
      const selectedVal = answers[q.q];
      const selectedSet = isMulti ? new Set(selectedVal || []) : null;
      let optsHtml = "";
      q.options.forEach((optText, oi) => {
        const letter = sec.letters[oi];
        const isSelected = isMulti ? selectedSet.has(letter) : (selectedVal === letter);
        optsHtml += optionRow(letter, optText, isSelected, isMulti, qi, oi);
      });
      bodyHtml += `
        <div class="qblock" data-qblock="${qi}">
          <div class="qhead">
            <div class="qnum">${String(qi+1).padStart(2,'0')}</div>
            <div>
              <div class="qtext">${esc(q.q)}</div>
              ${isMulti ? '<div class="qhint">Select up to 2 options</div>' : ''}
            </div>
          </div>
          ${optsHtml}
        </div>
      `;
    });
  }

  const isLast = currentSectionIdx === QUEST_DATA.length - 1;

  app.innerHTML = `
    ${brandbar()}
    <div class="screen" style="justify-content:flex-start;">
      ${renderTrail()}
      <div class="section-head">
        ${sunburstSVG()}
        <div class="sec-no">${esc(sec.section_no)}</div>
        <h2>${esc(sec.title)}</h2>
        ${sec.subtitle ? `<div class="sub">${esc(sec.subtitle)}</div>` : ""}
        ${sec.instructions ? `<div class="instructions">${esc(sec.instructions)}</div>` : ""}
      </div>
      <div id="qarea">${bodyHtml}</div>
      <div class="btn-row">
        ${currentSectionIdx > 0 ? `<button class="btn btn-ghost" id="backBtn">← Back</button>` : `<span></span>`}
        <button class="btn btn-primary" id="nextBtn">${isLast ? "Review & Submit →" : "Next Stage →"}</button>
      </div>
    </div>
  `;

  attachSectionHandlers(sec);
}

function attachSectionHandlers(sec){
  if (sec.type === "text"){
    document.querySelectorAll('#wat-block input[data-watidx]').forEach(inp=>{
      inp.addEventListener("input", (e)=>{
        const idx = parseInt(e.target.getAttribute("data-watidx"),10);
        const item = sec.questions[idx];
        answers[item.q] = e.target.value;
      });
    });
  } else {
    document.querySelectorAll('.opt').forEach(optEl=>{
      optEl.addEventListener("click", ()=>{
        const qi = parseInt(optEl.getAttribute("data-qidx"),10);
        const oi = parseInt(optEl.getAttribute("data-oidx"),10);
        const q = sec.questions[qi];
        const letter = sec.letters[oi];
        const qblock = optEl.closest(".qblock");

        if (sec.type === "multi"){
          let cur = new Set(answers[q.q] || []);
          if (cur.has(letter)){
            cur.delete(letter);
          } else {
            if (cur.size >= 2){
              toast("You can select up to 2 options for this question.");
              return;
            }
            cur.add(letter);
          }
          answers[q.q] = Array.from(cur);
        } else {
          answers[q.q] = letter;
        }
        qblock.classList.remove("unanswered-flag");
        // re-render just this qblock's options
        const optsContainer = qblock.querySelectorAll(".opt");
        const selSet = sec.type === "multi" ? new Set(answers[q.q]) : null;
        optsContainer.forEach((el,idx2)=>{
          const l2 = sec.letters[idx2];
          const isSel = sec.type === "multi" ? selSet.has(l2) : (answers[q.q] === l2);
          el.classList.toggle("selected", isSel);
        });
      });
    });
  }

  document.getElementById("nextBtn").addEventListener("click", onNextClick);
  const backBtn = document.getElementById("backBtn");
  if (backBtn) backBtn.addEventListener("click", ()=>{ currentSectionIdx--; renderSection(); window.scrollTo(0,0); });
}

function onNextClick(){
  const sec = QUEST_DATA[currentSectionIdx];
  let firstUnanswered = null;

  if (sec.type === "text"){
    sec.questions.forEach((item)=>{
      if (!answers[item.q] || !String(answers[item.q]).trim()){
        if (firstUnanswered === null) firstUnanswered = item;
      }
    });
  } else {
    sec.questions.forEach((q, qi)=>{
      const v = answers[q.q];
      const answeredOk = sec.type === "multi" ? (v && v.length > 0) : !!v;
      if (!answeredOk){
        if (firstUnanswered === null) firstUnanswered = q;
        const block = document.querySelector(`.qblock[data-qblock="${qi}"]`);
        if (block) block.classList.add("unanswered-flag");
      }
    });
  }

  if (firstUnanswered){
    toast("Please answer every question before continuing.");
    const flagged = document.querySelector(".unanswered-flag") || document.getElementById("wat-block");
    if (flagged) flagged.scrollIntoView({behavior:"smooth", block:"center"});
    return;
  }

  if (currentSectionIdx === QUEST_DATA.length - 1){
    submitQuest();
  } else {
    currentSectionIdx++;
    renderSection();
    window.scrollTo(0,0);
  }
}

/* =========================================================================
   SUBMIT
   ========================================================================= */
function formatAnswer(sec, q, letter){
  if (!letter) return "";
  const idx = sec.letters ? sec.letters.indexOf(letter) : -1;
  const text = (idx >= 0 && q.options && q.options[idx] !== undefined) ? q.options[idx] : "";
  return text ? (letter + ". " + text) : letter;
}

function buildFormDataPayload(){
  const out = {};
  QUEST_DATA.forEach((sec, si)=>{
    const headerKey = "__SECTION_HEADER__" + si;
    out[headerKey] = sec.section_no + ": " + sec.title + (sec.subtitle ? " — " + sec.subtitle : "");
    sec.questions.forEach((q)=>{
      const v = answers[q.q];
      if (sec.type === "text"){
        out[q.q] = v || "";
      } else if (sec.type === "multi"){
        const arr = (v || []).map(letter => formatAnswer(sec, q, letter));
        out[q.q] = arr.join("  |  ");
      } else {
        out[q.q] = v ? formatAnswer(sec, q, v) : "";
      }
    });
  });
  return out;
}

function renderSubmitting(){
  app.innerHTML = `
    ${brandbar()}
    <div class="screen"><div class="centerpane">
      <div class="ring"><div class="spinner"></div></div>
      <h1 class="title">Submitting your answers…</h1>
      <p class="lede">Please don't close this window. This may take a few seconds.</p>
    </div></div>
  `;
}

function renderThankYou(){
  app.innerHTML = `
    ${brandbar()}
    <div class="screen"><div class="centerpane">
      <span class="badge ok">Quest complete</span>
      <h1 class="title">Thank you, ${esc(student.name.split(" ")[0] || "explorer")}!</h1>
      <p class="lede">Your responses have been recorded. Your counsellor will be in touch with your personalised insights soon.</p>
    </div></div>
  `;
}

function renderSubmitError(message, payload){
  app.innerHTML = `
    ${brandbar()}
    <div class="screen"><div class="centerpane">
      <span class="badge denied">Submission failed</span>
      <h1 class="title">Something went wrong</h1>
      <p class="lede">${esc(message)}</p>
      <button class="btn btn-primary" id="retryBtn">Try Again</button>
    </div></div>
  `;
  document.getElementById("retryBtn").addEventListener("click", ()=> doSubmitRequest(payload));
}

async function doSubmitRequest(payload){
  renderSubmitting();
  try{
    const res = await sheetSubmit(payload);
    if (res.status === "ok"){
      renderThankYou();
    } else {
      renderSubmitError(res.msg || "The server could not save your answers. Please try again.", payload);
    }
  }catch(e){
    renderSubmitError(e.message || "We couldn't reach the server. Please check your connection and try again.", payload);
  }
}

function submitQuest(){
  const formData = buildFormDataPayload();
  const payload = {
    action: "submit",
    otp: OTP,
    name: student.name,
    email: student.email,
    studentClass: student.studentClass,
    school: student.school,
    parentName: student.parentName,
    ageGroup: student.ageGroup,
    contactNumber: student.contactNumber,
    formData: JSON.stringify(formData)
  };
  doSubmitRequest(payload);
}

/* =========================================================================
   BOOT
   ========================================================================= */
async function boot(){
  OTP = qs("otp").trim();
  if (!OTP){
    renderDenied("No access code was found in this link. Please use the exact link your counsellor shared with you.");
    return;
  }
  renderLoading("Verifying your access link…");
  try{
    const res = await sheetCheck(OTP);
    if (res.status === "ok"){
      renderWelcome();
    } else {
      renderDenied(res.msg || "This access link is invalid or has already been used.");
    }
  }catch(e){
    renderDenied(e.message || "We couldn't verify your access link. Please check your connection and try again.");
  }
}
boot();
</script>
