<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Thryve Quest — Admin</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,600;9..144,700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#11141a; --card:#1d2330; --border:#2b3247; --text:#f3eee3; --text-dim:#9aa3b8;
    --accent:#d2a24c; --accent-strong:#e8bd6e; --accent-soft:rgba(210,162,76,0.14);
    --danger:#e2685a; --success:#7fb39a; --serif:'Fraunces',serif; --sans:'Inter',system-ui,sans-serif; --mono:'JetBrains Mono',monospace;
  }
  *{box-sizing:border-box;}
  body{margin:0;background:var(--bg);color:var(--text);font-family:var(--sans);min-height:100vh;
       background-image:radial-gradient(circle at 12% -10%, rgba(210,162,76,0.10), transparent 45%);}
  #app{max-width:640px;margin:0 auto;padding:32px 20px 80px;}
  h1{font-family:var(--serif);font-weight:700;font-size:24px;margin:0 0 4px;}
  p.lede{color:var(--text-dim);font-size:14px;margin:0 0 26px;}
  .card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:24px;margin-bottom:20px;}
  label{display:block;font-size:13px;color:var(--text-dim);margin-bottom:7px;}
  input[type=text]{width:100%;background:#161b23;border:1px solid var(--border);color:var(--text);
    border-radius:10px;padding:12px 13px;font-family:var(--mono);font-size:15px;outline:none;}
  input:focus{border-color:var(--accent);}
  .row{display:flex;gap:10px;align-items:flex-end;flex-wrap:wrap;}
  .row > div{flex:1;min-width:160px;}
  button{appearance:none;border:none;cursor:pointer;font-family:var(--sans);font-weight:600;font-size:14px;
    padding:12px 20px;border-radius:999px;background:linear-gradient(135deg,var(--accent-strong),var(--accent));color:#1a1305;}
  button:disabled{opacity:.5;cursor:not-allowed;}
  button.ghost{background:transparent;border:1px solid var(--border);color:var(--text-dim);}
  .otplist{margin-top:16px;display:flex;flex-direction:column;gap:10px;}
  .otprow{display:flex;align-items:center;gap:10px;background:#161b23;border:1px solid var(--border);border-radius:10px;padding:10px 12px;}
  .otprow .code{font-family:var(--mono);font-size:14px;color:var(--accent);min-width:90px;}
  .otprow input{flex:1;font-size:12.5px;padding:8px 10px;}
  .otprow button{padding:8px 14px;font-size:12.5px;}
  #status{font-size:13px;margin-top:10px;}
  #status.ok{color:var(--success);}
  #status.err{color:var(--danger);}
  .eyebrow{font-family:var(--mono);font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--accent);}
</style>
</head>
<body>
<div id="app">
  <span class="eyebrow">Counsellor tool</span>
  <h1>Thryve Quest — Generate Access Links</h1>
  <p class="lede">Create one-time access codes for students. Each code can only be opened once — it locks the moment a student enters their details, so links can't be shared or reused.</p>

  <div class="card">
    <div class="row">
      <div>
        <label>Base form URL</label>
        <input type="text" id="formUrl" placeholder="https://yourdomain.com/index.html">
      </div>
      <div>
        <label>How many codes?</label>
        <input type="text" id="howMany" value="1">
      </div>
      <div style="flex:0 0 auto;">
        <button id="genBtn">Generate</button>
      </div>
    </div>
    <div id="status"></div>
    <div class="otplist" id="otplist"></div>
  </div>

  <div class="card">
    <label style="margin-bottom:10px;">Manually re-issue a single code</label>
    <div class="row">
      <div><input type="text" id="manualOtp" placeholder="Custom code, e.g. RHYTHM42"></div>
      <div style="flex:0 0 auto;"><button class="ghost" id="manualBtn">Add this code</button></div>
    </div>
  </div>
</div>

<script>
const CONFIG = { SCRIPT_URL: "https://script.google.com/macros/s/AKfycbxCnIQwezzE6mBMUXC4FdL3y22bm1gROHfX8DVeJ1XusePoYL7sP39bZ8PUCbOohtJe/exec" };

function randomCode(){
  const chars = "ABCDEFGHJKLMNPQRSTUVWXYZ23456789";
  let s = "";
  for (let i=0;i<8;i++) s += chars[Math.floor(Math.random()*chars.length)];
  return s;
}

function jsonp(params){
  return new Promise((resolve, reject) => {
    const cbName = "thryveAdminCb_" + Date.now() + "_" + Math.floor(Math.random()*100000);
    const script = document.createElement("script");
    const timer = setTimeout(() => { cleanup(); reject(new Error("Request timed out.")); }, 15000);
    function cleanup(){ delete window[cbName]; if (script.parentNode) script.parentNode.removeChild(script); clearTimeout(timer); }
    window[cbName] = (data) => { cleanup(); resolve(data); };
    const qs = new URLSearchParams({...params, callback: cbName});
    script.src = CONFIG.SCRIPT_URL + "?" + qs.toString();
    script.onerror = () => { cleanup(); reject(new Error("Could not reach the server.")); };
    document.body.appendChild(script);
  });
}

function setStatus(msg, ok){
  const el = document.getElementById("status");
  el.textContent = msg;
  el.className = ok ? "ok" : "err";
}

function addOtpRow(code){
  const base = document.getElementById("formUrl").value.trim() || "PASTE_YOUR_FORM_URL_HERE";
  const link = base.replace(/\/+$/,"") + "?otp=" + encodeURIComponent(code);
  const row = document.createElement("div");
  row.className = "otprow";
  row.innerHTML = `<span class="code">${code}</span><input type="text" readonly value="${link}"><button>Copy</button>`;
  row.querySelector("button").addEventListener("click", () => {
    navigator.clipboard.writeText(link);
    row.querySelector("button").textContent = "Copied!";
    setTimeout(()=>{ row.querySelector("button").textContent = "Copy"; }, 1500);
  });
  document.getElementById("otplist").prepend(row);
}

async function generateOne(code){
  await jsonp({ action: "add", otp: code });
  addOtpRow(code);
}

document.getElementById("genBtn").addEventListener("click", async () => {
  const n = Math.max(1, Math.min(50, parseInt(document.getElementById("howMany").value, 10) || 1));
  const btn = document.getElementById("genBtn");
  btn.disabled = true;
  setStatus("Generating " + n + " code(s)…", true);
  try{
    for (let i=0;i<n;i++){
      const code = randomCode();
      await generateOne(code);
    }
    setStatus("Done — " + n + " code(s) added to the OTPs sheet.", true);
  }catch(e){
    setStatus(e.message || "Something went wrong.", false);
  }finally{
    btn.disabled = false;
  }
});

document.getElementById("manualBtn").addEventListener("click", async () => {
  const code = document.getElementById("manualOtp").value.trim().toUpperCase();
  if (!code){ setStatus("Enter a code first.", false); return; }
  try{
    await generateOne(code);
    setStatus("Added code: " + code, true);
    document.getElementById("manualOtp").value = "";
  }catch(e){
    setStatus(e.message || "Something went wrong.", false);
  }
});
</script>
</body>
</html>
